# Sign and publish the plugin to the JetBrains Marketplace.
#
# Required repository secrets:
#   CERTIFICATE_CHAIN      - PEM-encoded certificate chain
#   PRIVATE_KEY            - PEM-encoded (encrypted) private key
#   PRIVATE_KEY_PASSWORD   - passphrase for PRIVATE_KEY
#   PUBLISH_TOKEN          - JetBrains Marketplace Hub permanent token
#
# See https://plugins.jetbrains.com/docs/intellij/plugin-signing.html
# and https://plugins.jetbrains.com/docs/intellij/deployment.html
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Sign and publish plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew verifyPluginSignature publishPlugin -PpluginVersion="${GITHUB_REF_NAME#v}"
